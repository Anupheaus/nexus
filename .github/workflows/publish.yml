name: Publish Package

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    steps:
      - uses: Anupheaus/ci-templates/.github/actions/pnpm-setup@v1
        with:
          node-auth-token: ${{ secrets.PACKAGES_TOKEN }}
          patch-package-json: 'true'
          install-args: '--no-frozen-lockfile'

  validate:
    name: Validate
    needs: [prepare]
    runs-on: ubuntu-latest
    steps:
      - uses: Anupheaus/ci-templates/.github/actions/pnpm-setup@v1
        with:
          node-auth-token: ${{ secrets.PACKAGES_TOKEN }}
          patch-package-json: 'true'
          install-args: '--no-frozen-lockfile'
      - name: Type check
        run: pnpm exec tsc --project tsconfig.ci.json
      - name: Dependency audit
        run: pnpm audit --audit-level=high
        continue-on-error: true
      - name: Secret scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified
      - name: Vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true

  test:
    name: Test
    needs: [prepare]
    runs-on: ubuntu-latest
    steps:
      - uses: Anupheaus/ci-templates/.github/actions/pnpm-setup@v1
        with:
          node-auth-token: ${{ secrets.PACKAGES_TOKEN }}
          patch-package-json: 'true'
          install-args: '--no-frozen-lockfile'
      - name: Run tests
        run: pnpm run test-ci

  publish:
    name: Publish
    needs: [validate, test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    permissions:
      contents: write
      packages: write
    steps:
      - uses: Anupheaus/ci-templates/.github/actions/pnpm-setup@v1
        with:
          node-auth-token: ${{ secrets.PACKAGES_TOKEN }}
          patch-package-json: 'true'
          install-args: '--no-frozen-lockfile'
          fetch-depth: '0'
      - name: Build
        run: pnpm run build
      - name: Bump version
        uses: phips28/gh-action-bump-version@master
        env:
          GITHUB_TOKEN: ${{ secrets.PACKAGES_TOKEN }}
      - name: Pack
        run: pnpm pack
      - name: Configure npm for GitHub Packages
        run: |
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> ~/.npmrc
          echo "@anupheaus:registry=https://npm.pkg.github.com/" >> ~/.npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PACKAGES_TOKEN }}
      - name: Publish
        run: |
          TGZ=$(ls anupheaus-socket-api-*.tgz 2>/dev/null | head -1)
          if [ -z "$TGZ" ]; then
            echo "No package tarball found. Contents:"
            ls -la
            exit 1
          fi
          npm publish "$TGZ" --registry https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PACKAGES_TOKEN }}
